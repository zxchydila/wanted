<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧУДИЛА</title>
    
    <!-- Подключаем Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* Твоя любимая темная эстетика */
        body {
            background-color: #0d0d0d;
            color: #555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Вкладка Автор */
        .author-tab {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border: 1px solid #222;
            cursor: pointer;
            color: #444;
            transition: 0.3s;
            z-index: 100;
            background: #0d0d0d;
            user-select: none;
        }
        .author-tab:hover { color: #888; border-color: #444; }

        /* Выезжающий профиль */
        .profile-container {
            position: fixed;
            top: 0;
            right: -300px;
            width: 260px;
            height: 100vh;
            background: #111;
            border-left: 1px solid #222;
            padding: 60px 20px 30px;
            transition: right 0.5s ease-in-out;
            text-align: center;
            z-index: 99;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .profile-container.active {
            right: 0;
        }

        .photo {
            width: 180px;
            border: 1px solid #222;
            filter: grayscale(100%) contrast(120%);
            margin-bottom: 15px;
        }

        .name {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            user-select: none;
        }
        .nickname {
            color: #444;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* Админские штучки */
        .admin-panel-btn {
            display: block;
            color: #00cccc;
            font-size: 11px;
            margin: 10px auto;
            cursor: pointer;
            border: 1px dashed #333;
            padding: 5px;
            width: 80%;
            user-select: none;
        }
        .admin-panel-btn:hover { border-color: #00cccc; color: #fff; }

        #admin-ban-list {
            margin-top: 25px;
            text-align: left;
            display: none;
        }
        .ban-title {
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
            letter-spacing: 1px;
        }
        .banned-user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 6px;
            color: #888;
        }

        /* Стена */
        .wall {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .message-block {
            position: absolute;
            color: #777;
            font-size: 14px;
            word-wrap: break-word;
            pointer-events: auto;
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        .msg-id {
            color: #333;
            font-size: 12px;
            margin-right: 5px;
        }

        .admin-btn {
            color: #ff4444;
            cursor: pointer;
            font-size: 10px;
            margin-left: 6px;
            opacity: 0.5;
            user-select: none;
        }
        .admin-btn:hover { opacity: 1; }
        
        .ban-btn { color: #ffaa00; }
        .edit-id-btn { color: #00cccc; }
        .unban-btn { color: #00ff66; margin-left: 0; }

        /* Ввод */
        .input-area {
            display: flex;
            gap: 10px;
            width: 80%;
            max-width: 600px;
            position: fixed;
            bottom: 30px;
            background-color: #0d0d0d;
            padding: 10px;
            z-index: 10;
        }

        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #ccc;
            font-family: inherit;
            padding: 5px;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid #333;
            color: #555;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { color: #fff; border-color: #555; }
    </style>
</head>
<body>

    <div class="author-tab" onclick="toggleAuthor()">Автор</div>

    <div class="profile-container" id="author-panel">
        <img src="5258170148458274468.jpg" class="photo" alt="Profile">
        <!-- Кликай сюда 5 раз для админки -->
        <div class="name" onclick="checkAdmin()">ЧУДИЛА</div>
        <div class="nickname" id="my-id-display">Загрузка ID...</div>
        
        <div id="my-id-edit-btn" class="admin-panel-btn" style="display: none;" onclick="changeMyId()">[Изменить свой ID]</div>
        <div id="logout-btn" class="admin-panel-btn" style="display: none; color: #ff4444;" onclick="logoutAdmin()">[Выйти из админки]</div>
        
        <div id="admin-ban-list">
            <div class="ban-title">ЧЕРНЫЙ СПИСОК:</div>
            <div id="banned-users-container"></div>
        </div>
    </div>

    <div class="wall" id="messages-wall"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="оставь свой след..." maxlength="20" autocomplete="off">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        // Твои личные настройки Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyArFyiSgozaIqjFJcs__46jpUvBzxpfcW8",
            authDomain: "chydila-d9a4b.firebaseapp.com",
            databaseURL: "https://chydila-d9a4b-default-rtdb.firebaseio.com/",
            projectId: "chydila-d9a4b",
            storageBucket: "chydila-d9a4b.firebasestorage.app",
            messagingSenderId: "711613391679",
            appId: "1:711613391679:web:86884a44f4e9542848a98a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Проверяем, был ли ты админом до перезагрузки
        let isAdmin = localStorage.getItem('is_admin_active') === 'true';
        let allMessages = {}; 
        let bannedList = [];

        let myUserId = localStorage.getItem('chudila_user_id');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chudila_user_id', myUserId);
        }
        
        function updateIdDisplay() {
            document.getElementById('my-id-display').innerText = '@' + myUserId.replace('user_', '');
        }
        updateIdDisplay();

        function toggleAuthor() {
            document.getElementById('author-panel').classList.toggle('active');
            if (isAdmin) renderAdminPanel();
        }

        database.ref('banned_users').on('value', (snapshot) => {
            bannedList = [];
            snapshot.forEach((child) => {
                if(child.val() === true) bannedList.push(child.key);
            });
            if (isAdmin) renderAdminPanel();
        });

        function renderAdminPanel() {
            const listBlock = document.getElementById('admin-ban-list');
            const container = document.getElementById('banned-users-container');
            const editIdBtn = document.getElementById('my-id-edit-btn');
            const logoutBtn = document.getElementById('logout-btn');
            
            if (!isAdmin) {
                listBlock.style.display = 'none';
                editIdBtn.style.display = 'none';
                logoutBtn.style.display = 'none';
                return;
            }
            
            listBlock.style.display = 'block';
            editIdBtn.style.display = 'block';
            logoutBtn.style.display = 'block';
            container.innerHTML = '';
            
            if (bannedList.length === 0) {
                container.innerHTML = '<div style="color: #333; font-size: 11px;">пусто...</div>';
                return;
            }
            
            bannedList.forEach(userId => {
                const row = document.createElement('div');
                row.className = 'banned-user-row';
                row.innerHTML = `<span>id: ${userId.replace('user_', '')}</span><span class="admin-btn unban-btn" onclick="unbanUser('${userId}')">[разбан]</span>`;
                container.appendChild(row);
            });
        }

        database.ref('messages').on('value', (snapshot) => {
            const wall = document.getElementById('messages-wall');
            wall.innerHTML = '';
            allMessages = snapshot.val() || {};
            
            Object.keys(allMessages).forEach((key) => {
                const msg = allMessages[key];
                const div = document.createElement('div');
                div.className = 'message-block';
                
                const deleteBtn = isAdmin ? `<span class="admin-btn" onclick="deleteMessage('${key}')">[x]</span>` : '';
                const banBtn = isAdmin ? `<span class="admin-btn ban-btn" onclick="banUser('${msg.sender}')">[ban]</span>` : '';
                
                const shortId = msg.sender ? msg.sender.replace('user_', '') : 'anon';
                div.innerHTML = `<span class="msg-id">[id: ${shortId}]</span>> ${msg.text} ${deleteBtn}${banBtn}`;
                div.style.top = msg.top + "%";
                div.style.left = msg.left + "%";
                wall.appendChild(div);
            });
        });

        function sendMessage() {
            const textInput = document.getElementById('msg-input');
            const text = textInput.value.trim();
            if (text === "") return;
            
            if (bannedList.includes(myUserId)) {
                alert("Ой, упс! Твой ID заблокирован.");
                return;
            }
            
            let myCount = 0;
            Object.values(allMessages).forEach(m => { if (m.sender === myUserId) myCount++; });
            if (myCount >= 3 && !isAdmin) {
                alert("Лимит сообщений исчерпан.");
                return;
            }
            
            database.ref('messages').push({
                text: text,
                top: Math.floor(Math.random() * 65 + 15), 
                left: Math.floor(Math.random() * 60 + 5),
                sender: myUserId
            });
            textInput.value = '';
        }

        let clickCount = 0;
        function checkAdmin() {
            clickCount++;
            if (clickCount >= 5) {
                const pass = prompt("Пароль:");
                if (pass === "666") {
                    localStorage.setItem('is_admin_active', 'true');
                    location.reload(); 
                }
                clickCount = 0;
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('is_admin_active');
            location.reload();
        }

        function deleteMessage(key) { if (isAdmin) database.ref('messages/' + key).remove(); }

        function banUser(userId) {
            if (isAdmin && confirm(`Забанить ${userId}?`)) {
                database.ref('banned_users/' + userId).set(true);
                Object.keys(allMessages).forEach(k => { if (allMessages[k].sender === userId) deleteMessage(k); });
            }
        }

        function unbanUser(userId) { if (isAdmin) database.ref('banned_users/' + userId).remove(); }

        function changeMyId() {
            if (!isAdmin) return;
            const res = prompt("Новый ID:");
            if (res) {
                myUserId = 'user_' + res.trim();
                localStorage.setItem('chudila_user_id', myUserId);
                updateIdDisplay();
            }
        }
    </script>
</body>
</html>
