<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧУДИЛА</title>
    
    <!-- Подключаем Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            background-color: #0d0d0d;
            color: #555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Кнопка Чаты (Сверху слева) */
        .chats-toggle-tab {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            border: 1px solid #222;
            cursor: pointer;
            color: #444;
            z-index: 100;
            background: #0d0d0d;
            user-select: none;
            transition: transform 0.4s ease-in-out, color 0.3s, border-color 0.3s;
        }
        .chats-toggle-tab:hover { color: #00cccc; border-color: #333; }
        .chats-toggle-tab.hidden { transform: translateX(-250px); }

        /* Кнопка Автор (Сверху справа) */
        .author-tab {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border: 1px solid #222;
            cursor: pointer;
            color: #444;
            z-index: 100;
            background: #0d0d0d;
            user-select: none;
            transition: transform 0.4s ease-in-out, color 0.3s, border-color 0.3s;
        }
        .author-tab:hover { color: #888; border-color: #444; }
        .author-tab.hidden { transform: translateX(250px); }

        /* Выплывающая панель чатов (Слева) */
        .chats-sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: #111;
            border-right: 1px solid #222;
            padding: 80px 20px 20px;
            transition: left 0.5s ease-in-out;
            z-index: 99;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .chats-sidebar.active { left: 0; }

        .chats-sidebar-title {
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .chat-list-item {
            padding: 10px;
            border: 1px solid #222;
            cursor: pointer;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .chat-list-item:hover { border-color: #444; color: #fff; background: #0d0d0d; }

        /* Выезжающая панель автора (Справа) */
        .profile-container {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: #111;
            border-left: 1px solid #222;
            padding: 80px 20px 20px;
            transition: right 0.5s ease-in-out;
            z-index: 99;
            box-sizing: border-box;
            text-align: center;
            overflow-y: auto;
        }
        .profile-container.active { right: 0; }

        .photo {
            width: 150px;
            border: 1px solid #222;
            filter: grayscale(100%) contrast(120%);
            margin: 0 auto 15px;
            display: block;
        }
        .name {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            user-select: none;
        }
        .nickname {
            color: #444;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* Админка */
        .admin-panel-btn {
            display: block;
            color: #00cccc;
            font-size: 11px;
            margin: 10px auto;
            cursor: pointer;
            border: 1px dashed #333;
            padding: 5px;
            width: 80%;
            user-select: none;
            text-align: center;
        }
        .admin-panel-btn:hover { border-color: #00cccc; color: #fff; }

        #admin-ban-list {
            margin-top: 25px;
            text-align: left;
            display: none;
        }
        .ban-title {
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
            letter-spacing: 1px;
        }
        .banned-user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 6px;
            color: #888;
        }

        /* Полноэкранный Чат */
        .fullscreen-chat {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0d0d0d;
            z-index: 200;
            flex-direction: column;
            box-sizing: border-box;
            padding: 30px;
        }
        .fullscreen-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .back-arrow {
            cursor: pointer;
            color: #ff4444;
            font-size: 16px;
            user-select: none;
            transition: 0.2s;
        }
        .back-arrow:hover { color: #fff; transform: translateX(-3px); }
        .chat-title {
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .fullscreen-messages {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #161616;
            background: #090909;
            padding: 20px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .inner-msg { word-break: break-all; line-height: 1.4; max-width: 80%; }
        
        .fullscreen-input-area {
            display: flex;
            gap: 15px;
            background: #0d0d0d;
        }
        .fullscreen-input-area input {
            flex-grow: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid #222;
            color: #ccc;
            font-family: inherit;
            padding: 10px;
            outline: none;
            font-size: 14px;
        }
        .fullscreen-input-area input:focus { border-color: #444; }

        /* Главная Стена */
        .wall {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }
        .message-block {
            position: absolute;
            color: #777;
            font-size: 14px;
            word-wrap: break-word;
            pointer-events: auto;
            white-space: nowrap;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chat-icon {
            font-size: 12px;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
            margin-bottom: 3px;
            user-select: none;
        }
        .chat-icon:hover { opacity: 1; transform: scale(1.2); }
        .msg-id { color: #333; font-size: 12px; margin-right: 5px; }

        .admin-btn {
            color: #ff4444; cursor: pointer; font-size: 10px; margin-left: 6px; opacity: 0.5; user-select: none;
        }
        .admin-btn:hover { opacity: 1; }
        .ban-btn { color: #ffaa00; }
        .edit-id-btn { color: #00cccc; }
        .unban-btn { color: #00ff66; margin-left: 0; }

        /* Ввод главного сообщения */
        .input-area {
            display: flex; gap: 10px; width: 80%; max-width: 600px; position: fixed; bottom: 30px; background-color: #0d0d0d; padding: 10px; z-index: 10;
        }
        button {
            background: transparent; border: 1px solid #333; color: #555; padding: 5px 15px; cursor: pointer; font-family: inherit;
        }
        button:hover { color: #fff; border-color: #555; }
    </style>
</head>
<body>

    <!-- Кнопки управления верхнего уровня -->
    <div class="chats-toggle-tab" id="chats-toggle-btn" onclick="toggleChatsSidebar()">💬 Чаты</div>
    <div class="author-tab" id="author-toggle-btn" onclick="toggleAuthor()">Автор</div>

    <!-- Выплывающая панель со списком чатов (Слева) -->
    <div class="chats-sidebar" id="chats-panel">
        <div class="chats-sidebar-title">ВАШИ ДИАЛОГИ:</div>
        <div id="chats-list-view"></div>
    </div>

    <!-- Выплывающая панель Автора (Справа) -->
    <div class="profile-container" id="author-panel">
        <img src="5258170148458274468.jpg" class="photo" alt="Profile">
        <div class="name" onclick="checkAdmin()">ЧУДИЛА</div>
        <div class="nickname" id="my-id-display">Загрузка ID...</div>
        
        <div id="my-id-edit-btn" class="admin-panel-btn" style="display: none;" onclick="changeMyId()">[Изменить свой ID]</div>
        <div id="logout-btn" class="admin-panel-btn" style="display: none; color: #ff4444;" onclick="logoutAdmin()">[Выйти из админки]</div>
        
        <div id="admin-ban-list">
            <div class="ban-title">ЧЕРНЫЙ СПИСОК:</div>
            <div id="banned-users-container"></div>
        </div>
    </div>

    <!-- ПОЛНОЭКРАННЫЙ ЖЕСТКИЙ ЧАТ -->
    <div class="fullscreen-chat" id="fullscreen-chat-view">
        <div class="fullscreen-header">
            <span class="back-arrow" onclick="closeFullscreenChat()">🡠 Назад</span>
            <span class="chat-title" id="chat-with-title">БЕСЕДА: @...</span>
        </div>
        <div class="fullscreen-messages" id="chat-messages-container"></div>
        <div class="fullscreen-input-area">
            <input type="text" id="chat-msg-input" placeholder="Пиши без ограничений и лимитов..." maxlength="100" autocomplete="off">
            <button onclick="sendDirectMessage()">Отправить</button>
        </div>
    </div>

    <!-- Главная Стена -->
    <div class="wall" id="messages-wall"></div>

    <!-- Панель отправки на стену -->
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="оставь свой след (макс. 3)..." maxlength="20" autocomplete="off">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArFyiSgozaIqjFJcs__46jpUvBzxpfcW8",
            authDomain: "chydila-d9a4b.firebaseapp.com",
            databaseURL: "https://chydila-d9a4b-default-rtdb.firebaseio.com/",
            projectId: "chydila-d9a4b",
            storageBucket: "chydila-d9a4b.firebasestorage.app",
            messagingSenderId: "711613391679",
            appId: "1:711613391679:web:86884a44f4e9542848a98a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isAdmin = localStorage.getItem('is_admin_active') === 'true';
        let allMessages = {}; 
        let bannedList = [];
        let clickCount = 0;
        
        let activeThreadRef = null;
        let activeTargetUser = null;
        let myDialogs = new Set();
        let activeChatMsgs = {}; // Кэш сообщений открытого приватного чата

        let myUserId = localStorage.getItem('chudila_user_id');
        if (!myUserId) {
            myUserId = 'user_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chudila_user_id', myUserId);
        }
        
        function updateIdDisplay() {
            document.getElementById('my-id-display').innerText = '@' + myUserId.replace('user_', '');
        }
        updateIdDisplay();

        function updateButtonStates() {
            const chatsPanel = document.getElementById('chats-panel');
            const authorPanel = document.getElementById('author-panel');
            const chatsBtn = document.getElementById('chats-toggle-btn');
            const authorBtn = document.getElementById('author-toggle-btn');

            if (chatsPanel.classList.contains('active')) {
                authorBtn.classList.add('hidden');
                chatsBtn.classList.remove('hidden');
            } else if (authorPanel.classList.contains('active')) {
                chatsBtn.classList.add('hidden');
                authorBtn.classList.remove('hidden');
            } else {
                chatsBtn.classList.remove('hidden');
                authorBtn.classList.remove('hidden');
            }
        }

        function toggleAuthor() {
            document.getElementById('chats-panel').classList.remove('active');
            document.getElementById('author-panel').classList.toggle('active');
            if (isAdmin) renderAdminPanel();
            updateButtonStates();
        }

        function toggleChatsSidebar() {
            document.getElementById('author-panel').classList.remove('active');
            document.getElementById('chats-panel').classList.toggle('active');
            if (document.getElementById('chats-panel').classList.contains('active')) {
                renderChatsList();
            }
            updateButtonStates();
        }

        database.ref('banned_users').on('value', (snapshot) => {
            bannedList = [];
            snapshot.forEach((child) => { if(child.val() === true) bannedList.push(child.key); });
            if (isAdmin) renderAdminPanel();
        });

        function renderAdminPanel() {
            const listBlock = document.getElementById('admin-ban-list');
            const container = document.getElementById('banned-users-container');
            const editIdBtn = document.getElementById('my-id-edit-btn');
            const logoutBtn = document.getElementById('logout-btn');
            
            if (!isAdmin) {
                listBlock.style.display = 'none';
                editIdBtn.style.display = 'none';
                logoutBtn.style.display = 'none';
                return;
            }
            
            listBlock.style.display = 'block';
            editIdBtn.style.display = 'block';
            logoutBtn.style.display = 'block';
            container.innerHTML = '';
            
            bannedList.forEach(userId => {
                const row = document.createElement('div');
                row.className = 'banned-user-row';
                row.innerHTML = `<span>id: ${userId.replace('user_', '')}</span><span class="admin-btn unban-btn" onclick="unbanUser('${userId}')">[разбан]</span>`;
                container.appendChild(row);
            });
        }

        database.ref('messages').on('value', (snapshot) => {
            const wall = document.getElementById('messages-wall');
            wall.innerHTML = '';
            allMessages = snapshot.val() || {};
            
            Object.keys(allMessages).forEach((key) => {
                const msg = allMessages[key];
                const div = document.createElement('div');
                div.className = 'message-block';
                
                const deleteBtn = isAdmin ? `<span class="admin-btn" onclick="deleteMessage('${key}')">[x]</span>` : '';
                const banBtn = isAdmin ? `<span class="admin-btn ban-btn" onclick="banUser('${msg.sender}')">[ban]</span>` : '';
                const editIdBtn = isAdmin ? `<span class="admin-btn edit-id-btn" onclick="changeUserId('${msg.sender}')">[id]</span>` : '';
                
                const shortId = msg.sender ? msg.sender.replace('user_', '') : 'anon';
                
                div.innerHTML = `
                    <span class="chat-icon" onclick="openPrivateChat('${msg.sender}')" title="Открыть чат на весь экран">💬</span>
                    <div>
                        <span class="msg-id">[id: ${shortId}]</span>> ${msg.text} ${deleteBtn}${banBtn}${editIdBtn}
                    </div>
                `;
                
                div.style.top = msg.top + "%";
                div.style.left = msg.left + "%";
                wall.appendChild(div);
            });
        });

        database.ref('direct_messages').on('value', (snapshot) => {
            myDialogs.clear();
            const threads = snapshot.val() || {};
            Object.keys(threads).forEach(threadId => {
                const parts = threadId.split('--');
                if (parts.includes(myUserId)) {
                    const otherUser = parts.find(p => p !== myUserId);
                    if (otherUser) myDialogs.add(otherUser);
                }
            });
            if (document.getElementById('chats-panel').classList.contains('active')) {
                renderChatsList();
            }
        });

        function renderChatsList() {
            const container = document.getElementById('chats-list-view');
            container.innerHTML = '';
            
            if (myDialogs.size === 0) {
                container.innerHTML = '<div style="color: #444; font-size: 11px; margin-top: 15px; line-height: 1.3;">Пока тихо... Нажмите на 💬 у любого следа на стене, чтобы начать секретную беседу.</div>';
                return;
            }
            
            myDialogs.forEach(userId => {
                const item = document.createElement('div');
                item.className = 'chat-list-item';
                item.innerText = `@${userId.replace('user_', '')}`;
                item.onclick = () => openPrivateChat(userId);
                container.appendChild(item);
            });
        }

        function openPrivateChat(targetUserId) {
            if (targetUserId === myUserId) {
                alert("Ой, упс! С самим собой секретничать не имеет смысла. 😉");
                return;
            }
            
            activeTargetUser = targetUserId;
            
            document.getElementById('chats-panel').classList.remove('active');
            document.getElementById('author-panel').classList.remove('active');
            updateButtonStates();
            
            document.getElementById('chat-with-title').innerText = 'БЕСЕДА: @' + targetUserId.replace('user_', '');
            document.getElementById('fullscreen-chat-view').style.display = 'flex';
            
            const threadId = [myUserId, targetUserId].sort().join('--');
            
            if (activeThreadRef) activeThreadRef.off();
            
            activeThreadRef = database.ref('direct_messages/' + threadId);
            activeThreadRef.on('value', (snapshot) => {
                const msgContainer = document.getElementById('chat-messages-container');
                msgContainer.innerHTML = '';
                activeChatMsgs = snapshot.val() || {};
                
                Object.entries(activeChatMsgs).forEach(([msgKey, m]) => {
                    const div = document.createElement('div');
                    div.className = 'inner-msg';
                    const isMe = m.sender === myUserId;
                    
                    div.style.color = isMe ? '#00cccc' : '#888';
                    div.style.textAlign = isMe ? 'right' : 'left';
                    div.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                    
                    let msgHtml = (isMe ? 'Вы: ' : '@' + targetUserId.replace('user_', '') + ': ') + m.text;
                    
                    // Кнопки удаления и редактирования в личке
                    let actions = '';
                    if (isMe) {
                        actions += ` <span class="admin-btn edit-id-btn" onclick="editDirectMessage('${msgKey}')">[ред]</span>`;
                        actions += ` <span class="admin-btn" onclick="deleteDirectMessage('${msgKey}')">[x]</span>`;
                    } else if (isAdmin) {
                        actions += ` <span class="admin-btn" onclick="deleteDirectMessage('${msgKey}')">[x]</span>`;
                    }
                    
                    div.innerHTML = `<div>${msgHtml}${actions}</div>`;
                    msgContainer.appendChild(div);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        // Функции удаления и изменения сообщений в ЛС
        function deleteDirectMessage(msgKey) {
            if (activeThreadRef && confirm("Удалить это сообщение из чата?")) {
                activeThreadRef.child(msgKey).remove();
            }
        }

        function editDirectMessage(msgKey) {
            if (!activeThreadRef || !activeChatMsgs[msgKey]) return;
            const oldText = activeChatMsgs[msgKey].text;
            const newText = prompt("Редактировать сообщение:", oldText);
            if (newText && newText.trim() !== "" && newText.trim() !== oldText) {
                activeThreadRef.child(msgKey).update({ text: newText.trim() });
            }
        }

        function closeFullscreenChat() {
            document.getElementById('fullscreen-chat-view').style.display = 'none';
            if (activeThreadRef) activeThreadRef.off();
            activeTargetUser = null;
            activeChatMsgs = {};
            updateButtonStates();
            renderChatsList();
        }

        function sendDirectMessage() {
            const input = document.getElementById('chat-msg-input');
            const text = input.value.trim();
            if (text === "" || !activeTargetUser || bannedList.includes(myUserId)) return;
            
            if (activeThreadRef) {
                activeThreadRef.push({
                    text: text,
                    sender: myUserId,
                    timestamp: Date.now()
                });
            }
            input.value = '';
        }

        function sendMessage() {
            const textInput = document.getElementById('msg-input');
            const text = textInput.value.trim();
            if (text === "" || bannedList.includes(myUserId)) return;
            
            let myCount = 0;
            Object.values(allMessages).forEach(m => { if (m.sender === myUserId) myCount++; });
            if (myCount >= 3 && !isAdmin) {
                alert("Лимит исчерпан. Разрешено оставить только 3 следа на стене.");
                return;
            }
            
            database.ref('messages').push({
                text: text,
                top: Math.floor(Math.random() * 65 + 15), 
                left: Math.floor(Math.random() * 60 + 5),
                sender: myUserId
            });
            textInput.value = '';
        }

        document.getElementById('chat-msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendDirectMessage();
        });
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function checkAdmin() {
            clickCount++;
            if (clickCount >= 5) {
                const pass = prompt("Пароль:");
                if (pass === "666") {
                    localStorage.setItem('is_admin_active', 'true');
                    location.reload(); 
                }
                clickCount = 0;
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('is_admin_active');
            location.reload();
        }

        function deleteMessage(key) { if (isAdmin) database.ref('messages/' + key).remove(); }

        function banUser(userId) {
            if (isAdmin && confirm(`Забанить ${userId}?`)) {
                database.ref('banned_users/' + userId).set(true);
                Object.keys(allMessages).forEach(k => { if (allMessages[k].sender === userId) deleteMessage(k); });
            }
        }
        function unbanUser(userId) { if (isAdmin) database.ref('banned_users/' + userId).remove(); }

        function changeMyId() {
            if (!isAdmin) return;
            const res = prompt("Твой новый ID:");
            if (res) {
                myUserId = 'user_' + res.trim();
                localStorage.setItem('chudila_user_id', myUserId);
                updateIdDisplay();
            }
        }

        function changeUserId(oldUserId) {
            if (!isAdmin) return;
            const res = prompt(`Новый ID для ${oldUserId.replace('user_', '')}:`);
            if (res && res.trim() !== "") {
                const newUserId = 'user_' + res.trim();
                Object.keys(allMessages).forEach(key => {
                    if (allMessages[key].sender === oldUserId) {
                        database.ref('messages/' + key).update({ sender: newUserId });
                    }
                });
                alert("Готово! ID изменен.");
            }
        }
    </script>
</body>
</html>
