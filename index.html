<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED - ДОСЬЕ</title>
    <style>
        body {
            background-color: #1a1a1a; 
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }
        
        /* Тот самый крутой RGB-глюк для заголовка */
        .glitch-title {
            font-size: 70px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            animation: glitch-anim 2s infinite;
        }
        
        @keyframes glitch-anim {
            0% { text-shadow: 4px 0 red, -4px 0 blue; transform: translate(0); }
            10% { text-shadow: -4px 0 red, 4px 0 blue; transform: translate(-2px, 2px); }
            20% { text-shadow: 4px 0 red, -4px 0 blue; transform: translate(2px, -2px); }
            30% { text-shadow: -4px 0 red, 4px 0 blue; transform: translate(0); }
            100% { text-shadow: 4px 0 red, -4px 0 blue; transform: translate(0); }
        }

        .main-content {
            display: flex;
            gap: 40px;
            align-items: center;
            max-width: 900px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Жуткие помехи для твоей фотографии */
        .photo {
            width: 250px;
            border: 2px solid #333;
            animation: photo-glitch 4s infinite;
        }

        @keyframes photo-glitch {
            0% { filter: grayscale(10%) contrast(110%); transform: translateX(0); }
            2% { filter: grayscale(100%) contrast(200%) hue-rotate(90deg); transform: translateX(-4px); }
            4% { filter: grayscale(10%) contrast(110%); transform: translateX(0); }
            6% { filter: invert(20%) grayscale(50%); transform: translateX(4px); }
            8% { filter: grayscale(10%) contrast(110%); transform: translateX(0); }
            100% { filter: grayscale(10%) contrast(110%); transform: translateX(0); }
        }

        .info-block {
            text-align: left;
            font-size: 22px;
            line-height: 1.8;
            font-family: 'Courier New', Courier, monospace;
        }

        .danger {
            color: #ff3333;
            font-weight: bold;
            margin-top: 15px;
        }

        .reason {
            font-size: 20px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            max-width: 800px;
        }

        .emblem {
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="glitch-title">ОБВИНЕНИЕ</div>

    <div class="main-content">
        <!-- Твоя загруженная фотография -->
        <img src="5258170148458274468.jpg" class="photo" alt="Wanted">
        
        <div class="info-block">
            <div>ФИО: ЖЕНЯ "CHUDILA"</div>
            <div>ДАТА РОЖДЕНИЯ: СКРЫТО</div>
            <div>СТАТУС: В РОЗЫСКЕ</div>
            <div class="danger">ОСОБО ОПАСЕН / ВРАГ НАРОДА</div>
        </div>
    </div>

    <div class="reason">
        ЗА ОСКОРБЛЕНИЕ ЧУВСТВ В ИНТЕРНЕТЕ И БЕЗГРАНИЧНУЮ ТОКСИЧНОСТЬ
    </div>

    <div class="emblem">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Lesser_Coat_of_Arms_of_Ukraine.svg" style="width: 80px; opacity: 0.3; filter: grayscale(100%) contrast(200%);">
    </div>

</body>
</html>
